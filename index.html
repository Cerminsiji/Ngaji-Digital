<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ngaji Digital Pro 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --quran-size: 2.2rem; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #011a14; color: #f0fdf4; margin:0; overflow-x: hidden; }
    .glass { background: rgba(6, 78, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(16, 185, 129, 0.1); }
    .font-quran { font-family: 'Amiri', serif; font-size: var(--quran-size); direction: rtl; line-height: 2.2; }
    .card-gradient { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); }
    .btn-active:active { transform: scale(0.95); transition: 0.1s; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    /* Animasi masuk konten */
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="pb-32 hide-scroll">

  <header class="p-6 sticky top-0 z-50 glass flex justify-between items-center border-b border-white/5">
    <div>
      <h1 class="text-xl font-black text-emerald-400 leading-none tracking-tighter uppercase italic">Ngaji Digital</h1>
      <p id="cityLabel" class="text-[9px] font-bold opacity-40 uppercase tracking-widest mt-1 italic">Menghubungkan...</p>
    </div>
    <button onclick="toggleModal('cityModal')" class="bg-emerald-500 text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase btn-active shadow-lg shadow-emerald-500/20">Ganti Kota</button>
  </header>

  <main id="appContent" class="p-5 max-w-xl mx-auto space-y-6 fade-in"></main>

  <div id="cityModal" class="fixed inset-0 z-[60] bg-black/95 backdrop-blur-md p-8 hidden">
    <div class="flex justify-between items-center mb-8">
      <h3 class="font-black text-emerald-400 uppercase tracking-tighter text-xl italic">Lokasi</h3>
      <button onclick="toggleModal('cityModal')" class="text-red-400 font-bold text-xs bg-red-400/10 px-4 py-2 rounded-full uppercase">Tutup</button>
    </div>
    <div class="flex gap-2 mb-6">
      <input type="text" id="cityInput" class="flex-1 bg-emerald-900/30 p-5 rounded-2xl outline-none border border-emerald-500/20 text-white font-bold" placeholder="Ketik nama kota...">
      <button onclick="searchCity()" class="bg-emerald-500 text-black px-8 font-black rounded-2xl btn-active uppercase text-[10px]">CARI</button>
    </div>
    <div id="cityResult" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2 hide-scroll"></div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 glass p-5 flex justify-around items-center z-50 rounded-t-[2.5rem] border-t border-emerald-500/10">
    <button onclick="renderHome()" class="flex flex-col items-center gap-1 btn-active group">
      <span class="text-xl group-hover:scale-110 transition-transform">🏠</span>
      <span class="text-[8px] font-black uppercase opacity-60">Home</span>
    </button>
    <button onclick="loadQuran()" class="flex flex-col items-center gap-1 btn-active group">
      <span class="text-xl group-hover:scale-110 transition-transform">📖</span>
      <span class="text-[8px] font-black uppercase opacity-60">Mushaf</span>
    </button>
    <button onclick="loadDoa()" class="flex flex-col items-center gap-1 btn-active group">
      <span class="text-xl group-hover:scale-110 transition-transform">📿</span>
      <span class="text-[8px] font-black uppercase opacity-60">Doa</span>
    </button>
    <button onclick="loadTahlil()" class="flex flex-col items-center gap-1 btn-active group">
      <span class="text-xl group-hover:scale-110 transition-transform">🕯️</span>
      <span class="text-[8px] font-black uppercase opacity-60">Tahlil</span>
    </button>
  </nav>

  <script>
    // URL API YANG ANDA BERIKAN
    const API = "https://script.google.com/macros/s/AKfycbwQnpc4W4tWJGff65X0aj11yfnJ7eXQCac590phW-aH_DSLZmLW3hS_347pixqWAmJD/exec"; 

    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

    // --- DASHBOARD UTAMA ---
    function renderHome() {
      const city = localStorage.getItem('m_city_name') || "JAKARTA";
      const cid = localStorage.getItem('m_city_id') || "1301";
      
      document.getElementById('appContent').innerHTML = `
        <div class="p-8 rounded-[3rem] card-gradient shadow-2xl relative border border-white/5 fade-in">
          <div class="text-center">
            <div id="calendarHeader" class="mb-4 space-y-1">
              <p id="dateMasehi" class="text-[10px] font-extrabold text-white/70 uppercase tracking-widest italic animate-pulse">Memuat Tanggal...</p>
              <div class="py-1">
                <p id="dateHijri" class="text-xl font-quran text-emerald-400 italic leading-none tracking-wider">-- -- ---- H</p>
              </div>
            </div>

            <h2 id="digitalClock" class="text-7xl font-black tracking-tighter mb-2 italic">00:00</h2>
            
            <p class="text-[10px] font-black text-emerald-400 bg-emerald-400/10 inline-block px-4 py-1.5 rounded-full uppercase mb-8 italic">📍 ${city}</p>
            
            <div id="sholatGrid" class="grid grid-cols-3 gap-3">
              ${['Imsak','Subuh','Dzuhur','Ashar','Maghrib','Isya'].map(s => `
                <div class="text-center p-3 bg-black/30 rounded-2xl border border-white/5">
                  <p class="text-[8px] font-black uppercase opacity-40 mb-1">${s}</p>
                  <p id="val-${s.toLowerCase()}" class="text-sm font-black text-emerald-50 tracking-tight">--:--</p>
                </div>`).join('')}
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div onclick="loadQuran()" class="glass p-8 rounded-[2.5rem] text-center btn-active cursor-pointer border border-emerald-500/5">
            <span class="text-3xl">📖</span>
            <p class="text-[9px] font-black mt-3 uppercase opacity-50 tracking-tighter">Buka Mushaf</p>
          </div>
          <div onclick="fullSync()" id="syncBtn" class="glass p-8 rounded-[2.5rem] text-center btn-active cursor-pointer border border-emerald-500/5">
            <span class="text-3xl text-emerald-400">🔄</span>
            <p class="text-[9px] font-black mt-3 uppercase opacity-50 tracking-tighter">Update Data</p>
          </div>
        </div>
      `;
      updateClock();
      fetchDataHome(cid, city);
    }

    function updateClock() {
      const el = document.getElementById('digitalClock');
      if(el) {
        const now = new Date();
        el.innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
      }
      setTimeout(updateClock, 1000);
    }

    async function fetchDataHome(id, name) {
      document.getElementById('cityLabel').innerText = "📍 " + name;
      try {
        const [resCal, resSholat] = await Promise.all([
          fetch(`${API}?action=getCalendar`).then(r => r.json()),
          fetch(`${API}?action=getSholat&id=${id}`).then(r => r.json())
        ]);

        if(resCal.status) {
          document.getElementById('dateMasehi').innerText = resCal.masehi;
          document.getElementById('dateHijri').innerText = resCal.hijri;
        }

        if(resSholat.data && resSholat.data.jadwal) {
          const j = resSholat.data.jadwal;
          const map = { 'val-imsak': j.imsak, 'val-subuh': j.subuh, 'val-dzuhur': j.dzuhur, 'val-ashar': j.ashar, 'val-maghrib': j.maghrib, 'val-isya': j.isya };
          for (const [key, val] of Object.entries(map)) {
            const el = document.getElementById(key);
            if(el) el.innerText = val || "--:--";
          }
        }
      } catch(e) { console.error("Gagal sinkronisasi dashboard"); }
    }

    // --- LOKASI ---
    async function searchCity() {
      const q = document.getElementById('cityInput').value;
      if(!q) return;
      document.getElementById('cityResult').innerHTML = '<p class="text-center py-10 font-black opacity-20 animate-pulse">MENCARI...</p>';
      try {
        const res = await fetch(`${API}?action=searchKota&q=${encodeURIComponent(q)}`);
        const d = await res.json();
        if(d.status && d.data) {
          document.getElementById('cityResult').innerHTML = d.data.map(c => `
            <div onclick="setCity('${c.id}', '${c.lokasi}')" class="p-5 glass rounded-2xl font-black text-sm cursor-pointer hover:bg-emerald-500 hover:text-black uppercase italic transition-colors">📍 ${c.lokasi}</div>
          `).join('');
        }
      } catch(e) { alert("Gagal mencari kota. Coba lagi."); }
    }

    function setCity(id, name) { localStorage.setItem('m_city_id', id); localStorage.setItem('m_city_name', name); toggleModal('cityModal'); renderHome(); }

    // --- QURAN ---
    async function loadQuran() {
      const content = document.getElementById('appContent');
      content.innerHTML = '<div class="py-20 text-center animate-pulse uppercase font-black text-emerald-400">Menghubungkan Mushaf...</div>';
      try {
        const res = await fetch(`${API}?action=getSurah`);
        const data = await res.json();
        content.innerHTML = data.map(s => `
          <div onclick="openSurah(${s.ID}, '${s.Nama}')" class="glass p-5 rounded-3xl flex justify-between items-center mb-3 cursor-pointer btn-active fade-in">
            <div class="flex items-center gap-5">
              <span class="w-10 h-10 bg-emerald-500 text-black flex items-center justify-center rounded-2xl font-black text-xs shadow-lg shadow-emerald-500/20">${s.ID}</span>
              <p class="font-black text-sm uppercase tracking-tight">${s.Nama}</p>
            </div>
            <span class="font-quran text-xl text-emerald-400/30">${s["Nama Arab"]}</span>
          </div>`).join('');
      } catch(e) { content.innerHTML = '<p class="text-center py-20 opacity-40">Gagal memuat daftar surah.</p>'; }
    }

    async function openSurah(id, name) {
      const content = document.getElementById('appContent');
      content.innerHTML = '<div class="py-20 text-center animate-pulse uppercase font-black">Membuka Ayat...</div>';
      try {
        const res = await fetch(`${API}?action=getAyatData&surahId=${id}`);
        const d = await res.json();
        content.innerHTML = `<div class="glass p-10 rounded-[3rem] mb-6 text-center italic font-black text-emerald-400 text-2xl uppercase fade-in">${name}</div>` + d.ayat.map(a => `
          <div class="glass p-10 rounded-[3rem] border border-white/5 mb-6 relative fade-in">
            <span class="absolute top-8 left-8 text-[9px] font-black opacity-30 italic">AYAT ${a.nomorAyat}</span>
            <div class="font-quran text-right mb-8 text-emerald-50 leading-relaxed">${a.teksArab}</div>
            <p class="text-[14px] opacity-60 italic border-l-2 border-emerald-500/40 pl-6 leading-relaxed">${a.teksIndonesia}</p>
          </div>`).join('');
        window.scrollTo(0,0);
      } catch(e) { alert("Gagal memuat ayat."); }
    }

    // --- DOA & TAHLIL ---
    async function loadDoa() {
      const content = document.getElementById('appContent');
      content.innerHTML = '<p class="text-center py-20 font-black opacity-20 uppercase italic animate-pulse">Menyiapkan Doa...</p>';
      try {
        const res = await fetch(`${API}?action=getDoa`);
        const data = await res.json();
        content.innerHTML = data.map(d => `
          <div class="glass p-10 rounded-[3rem] mb-6 fade-in">
            <h4 class="font-black text-emerald-400 uppercase text-[11px] mb-6 italic border-b border-white/5 pb-4 tracking-widest">${d.Judul}</h4>
            <div class="font-quran text-right mb-6 text-emerald-50">${d.Arab}</div>
            <p class="text-xs opacity-50 italic pt-6 border-t border-white/10 leading-loose">${d.Terjemah}</p>
          </div>`).join('');
      } catch(e) { content.innerHTML = '<p class="text-center py-20 opacity-40 uppercase">Maaf, data Doa belum tersedia.</p>'; }
    }

    async function loadTahlil() {
      const content = document.getElementById('appContent');
      content.innerHTML = '<p class="text-center py-20 font-black opacity-20 uppercase italic animate-pulse">Menyiapkan Tahlil...</p>';
      try {
        const res = await fetch(`${API}?action=getTahlil`);
        const data = await res.json();
        content.innerHTML = data.map(t => `
          <div class="glass p-10 rounded-[3rem] mb-6 fade-in">
            <h4 class="font-black text-emerald-400 uppercase text-[11px] mb-6 italic border-b border-white/5 pb-4 tracking-widest">${t.Judul}</h4>
            <div class="font-quran text-right mb-6 text-emerald-50">${t.Arab}</div>
            <p class="text-xs opacity-50 italic pt-6 border-t border-white/10 leading-loose">${t.Terjemah}</p>
          </div>`).join('');
      } catch(e) { content.innerHTML = '<p class="text-center py-20 opacity-40 uppercase">Maaf, data Tahlil belum tersedia.</p>'; }
    }

    async function fullSync() {
      const btn = document.getElementById('syncBtn');
      btn.classList.add('animate-spin');
      try {
        const res = await fetch(`${API}?action=sync`);
        const d = await res.json();
        alert(d.message || "Sinkronisasi selesai!");
      } catch(e) { alert("Sinkronisasi gagal. Pastikan koneksi stabil."); }
      btn.classList.remove('animate-spin');
      renderHome();
    }

    // Jalankan Dashboard saat pertama dimuat
    window.onload = renderHome;
  </script>
</body>
</html>
