<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --quran-size: 2.2rem; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #011a14; color: #f0fdf4; }
    .font-quran { font-family: 'Amiri', serif; }
    .glass { background: rgba(6, 78, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(16, 185, 129, 0.1); }
    .btn-active:active { transform: scale(0.95); transition: 0.1s; }
  </style>
</head>
<body class="pb-32">

  <header class="p-6 sticky top-0 z-50 glass flex justify-between items-center border-b border-white/5">
    <div>
      <h1 class="text-xl font-black text-emerald-400 leading-none">NGAJI DIGITAL</h1>
      <p id="cityLabel" class="text-[9px] font-bold opacity-40 uppercase tracking-widest mt-1">Memuat...</p>
    </div>
    <div class="flex gap-2">
      <button onclick="toggleModal('cityModal')" class="bg-emerald-500 text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase btn-active">Ganti Kota</button>
    </div>
  </header>

  <main id="appContent" class="p-5 max-w-xl mx-auto space-y-6"></main>

  <div id="cityModal" class="fixed inset-0 z-[60] bg-black/95 backdrop-blur-md p-8 hidden">
    <div class="flex justify-between items-center mb-8">
      <h3 class="font-black text-emerald-400 uppercase text-xl">Pencarian Kota</h3>
      <button onclick="toggleModal('cityModal')" class="text-red-400 font-bold">TUTUP</button>
    </div>
    <div class="flex gap-2 mb-6">
      <input type="text" id="cityInput" class="flex-1 bg-emerald-900/30 p-5 rounded-2xl outline-none" placeholder="Ketik nama kota...">
      <button onclick="searchCity()" class="bg-emerald-500 text-black px-8 font-black rounded-2xl">CARI</button>
    </div>
    <div id="cityResult" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 glass p-5 flex justify-around items-center z-50 rounded-t-[2.5rem]">
    <button onclick="renderHome()"><span class="text-xl">🏠</span></button>
    <button onclick="loadQuran()"><span class="text-xl">📖</span></button>
    <button onclick="loadDoa()"><span class="text-xl">📿</span></button>
    <button onclick="loadTahlil()"><span class="text-xl">🕯️</span></button>
  </nav>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbwUr-Thm-lKknvmM3cYdCUl8781tG6dYULzriv7d30wSlgpllNWX2kdjQYSzI6m1cpv/exec"; // GANTI DENGAN URL DEPLOYMENT ANDA

    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

    function renderHome() {
      const city = localStorage.getItem('m_city_name') || "JAKARTA";
      const cid = localStorage.getItem('m_city_id') || 1301;
      
      const now = new Date();
      const masehi = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      const hijri = new Intl.DateTimeFormat('id-TN-u-ca-islamic-uma', { day: 'numeric', month: 'long', year: 'numeric' }).format(now);

      document.getElementById('appContent').innerHTML = `
        <div class="p-8 rounded-[3rem] bg-gradient-to-br from-emerald-800 to-emerald-950 shadow-2xl relative border border-white/5">
          <div class="mb-4 space-y-0.5">
            <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">${masehi}</p>
            <p class="text-[12px] font-bold text-white/40 font-quran">${hijri} H</p>
          </div>
          <h2 id="digitalClock" class="text-7xl font-black tracking-tighter mb-2">00:00</h2>
          <p class="text-[10px] font-black text-emerald-400 bg-emerald-400/10 inline-block px-3 py-1 rounded-full uppercase tracking-widest mb-8">📍 ${city}</p>
          <div class="grid grid-cols-3 gap-3">
            ${['Imsak','Subuh','Dzuhur','Ashar','Maghrib','Isya'].map(s => `
              <div class="text-center p-3 bg-black/20 rounded-2xl border border-white/5">
                <p class="text-[8px] font-black uppercase opacity-40 mb-1">${s}</p>
                <p id="val-${s.toLowerCase()}" class="text-sm font-black">--:--</p>
              </div>`).join('')}
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div onclick="loadQuran()" class="glass p-8 rounded-[2.5rem] text-center btn-active"><span class="text-3xl">📖</span><p class="text-[9px] font-black mt-3 uppercase opacity-50">Al-Quran</p></div>
          <div onclick="fullSync()" id="syncBtn" class="glass p-8 rounded-[2.5rem] text-center border-emerald-500/20 btn-active"><span class="text-3xl">🔄</span><p class="text-[9px] font-black mt-3 uppercase opacity-50">Sync Data</p></div>
        </div>
      `;
      updateClock(); fetchSholat(cid, city);
    }

    function updateClock() {
      const el = document.getElementById('digitalClock');
      if(el) el.innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', hour12:false}).replace('.', ':');
      setTimeout(updateClock, 1000);
    }

    async function fetchSholat(id, name) {
      document.getElementById('cityLabel').innerText = "📍 " + name;
      try {
        const res = await fetch(`${API}?action=getSholat&id=${id}`);
        const d = await res.json();
        if(d.data && d.data.jadwal) {
          ['imsak','subuh','dzuhur','ashar','maghrib','isya'].forEach(k => {
            const el = document.getElementById('val-' + k);
            if(el) el.innerText = d.data.jadwal[k];
          });
        }
      } catch(e) {}
    }

    async function fullSync() {
      const btn = document.getElementById('syncBtn');
      btn.classList.add('animate-pulse');
      try {
        const res = await fetch(`${API}?action=sync`);
        const d = await res.json();
        alert(d.message);
      } catch(e) { alert("Gagal!"); }
      btn.classList.remove('animate-pulse');
      renderHome();
    }

    // Fungsi muat konten lainnya (Quran, Doa, Tahlil) tetap sama seperti versi sebelumnya
    async function loadQuran() {
      document.getElementById('appContent').innerHTML = '<p class="text-center py-20 font-black opacity-30 animate-pulse uppercase">Membuka Mushaf...</p>';
      const res = await fetch(`${API}?action=getSurah`);
      const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.ID}, '${s.Nama}')" class="glass p-5 rounded-3xl flex justify-between items-center mb-2 btn-active">
          <div class="flex items-center gap-4"><span class="w-8 h-8 bg-emerald-500 text-black flex items-center justify-center rounded-lg font-black text-xs">${s.ID}</span><p class="font-bold text-sm uppercase">${s.Nama}</p></div>
          <span class="font-quran text-lg opacity-30">${s["Nama Arab"]}</span>
        </div>`).join('');
    }

    async function loadDoa() {
      document.getElementById('appContent').innerHTML = '<p class="text-center py-20 font-black opacity-30 animate-pulse">MEMUAT DOA...</p>';
      const res = await fetch(`${API}?action=getDoa`);
      const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(d => `
        <div class="glass p-8 rounded-[2.5rem] mb-4">
          <h4 class="text-[10px] font-black text-emerald-400 mb-6 uppercase border-b border-white/5 pb-4">${d.Judul}</h4>
          <div class="font-quran text-right mb-8 text-emerald-50 text-2xl" style="direction:rtl">${d.Arab}</div>
          <p class="text-xs opacity-50 italic">${d.Terjemah}</p>
        </div>`).join('');
    }

    async function loadTahlil() {
      document.getElementById('appContent').innerHTML = '<p class="text-center py-20 font-black opacity-30 animate-pulse">MEMUAT TAHLIL...</p>';
      const res = await fetch(`${API}?action=getTahlil`);
      const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(t => `
        <div class="glass p-8 rounded-[2.5rem] mb-4">
          <h4 class="text-[10px] font-black text-emerald-400 mb-6 uppercase">${t.Judul}</h4>
          <div class="font-quran text-right mb-8 text-emerald-50 text-2xl" style="direction:rtl">${t.Arab}</div>
          <p class="text-xs opacity-50 italic">${t.Terjemah}</p>
        </div>`).join('');
    }

    async function searchCity() {
      const q = document.getElementById('cityInput').value;
      const res = await fetch(`${API}?action=searchKota&q=${q}`);
      const d = await res.json();
      document.getElementById('cityResult').innerHTML = d.data.map(c => `
        <div onclick="setCity('${c.id}', '${c.lokasi}')" class="p-4 glass rounded-xl font-bold cursor-pointer uppercase text-xs">📍 ${c.lokasi}</div>
      `).join('');
    }

    function setCity(id, name) {
      localStorage.setItem('m_city_id', id); localStorage.setItem('m_city_name', name);
      toggleModal('cityModal'); renderHome();
    }

    window.onload = renderHome;
  </script>
</body>
</html>
