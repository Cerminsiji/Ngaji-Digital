<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #022c22; color: #ecfdf5; }
    .font-quran { font-family: 'Amiri', serif; direction: rtl; line-height: 2.8; font-size: 2.2rem; }
    .glass-card { background: rgba(6, 78, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.1); }
    .loader { border-top-color: #10b981; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="pb-28">

  <header class="p-6 sticky top-0 z-50 glass-card flex justify-between items-center">
    <div onclick="goHome()" class="cursor-pointer">
      <h1 class="text-xl font-extrabold tracking-tighter text-emerald-400">AYO NGAJI</h1>
      <p id="topCity" class="text-[10px] font-bold opacity-60 uppercase">Memuat lokasi...</p>
    </div>
    <button onclick="fullSyncServer()" class="p-2 bg-emerald-800 rounded-lg text-[10px] font-bold px-4">🔄 SYNC DATA</button>
  </header>

  <main id="appContent" class="p-4 max-w-4xl mx-auto space-y-6"></main>

  <nav class="fixed bottom-0 left-0 right-0 glass-card px-6 py-4 flex justify-around items-center z-50 rounded-t-[2rem]">
    <button onclick="goHome()" class="flex flex-col items-center gap-1 opacity-50"><span class="text-xl">🏠</span><span class="text-[8px] font-bold">HOME</span></button>
    <button onclick="loadQuran()" class="flex flex-col items-center gap-1 opacity-50"><span class="text-xl">📖</span><span class="text-[8px] font-bold">QURAN</span></button>
    <button onclick="loadHadits()" class="flex flex-col items-center gap-1 opacity-50"><span class="text-xl">📚</span><span class="text-[8px] font-bold">HADITS</span></button>
    <button onclick="loadTahlil()" class="flex flex-col items-center gap-1 opacity-50"><span class="text-xl">🕯️</span><span class="text-[8px] font-bold">TAHLIL</span></button>
  </nav>

  <script>
    const API = "<?= ScriptApp.getService().getUrl() ?>";

    function showLoading() { document.getElementById('appContent').innerHTML = '<div class="flex justify-center py-20"><div class="loader w-10 h-10 border-4 rounded-full border-emerald-500"></div></div>'; }

    // --- BERANDA ---
    async function goHome() {
      const cityName = localStorage.getItem('cityName') || "JAKARTA";
      document.getElementById('appContent').innerHTML = `
        <div class="p-8 rounded-[3rem] bg-gradient-to-br from-emerald-800 to-emerald-950 shadow-2xl relative overflow-hidden mb-6">
          <div class="flex justify-between items-end relative z-10">
            <div><p class="text-[10px] font-bold opacity-60 uppercase">Jadwal: ${cityName}</p><h2 id="clock" class="text-6xl font-black tracking-tighter">--:--</h2></div>
          </div>
          <div id="prayerGrid" class="mt-8 grid grid-cols-5 gap-2 relative z-10"></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div onclick="loadQuran()" class="glass-card p-10 rounded-[2.5rem] text-center cursor-pointer"><span class="text-3xl">📖</span><p class="mt-2 font-bold text-[10px]">QURAN</p></div>
          <div onclick="loadHadits()" class="glass-card p-10 rounded-[2.5rem] text-center cursor-pointer"><span class="text-3xl">📚</span><p class="mt-2 font-bold text-[10px]">HADITS</p></div>
          <div onclick="loadDoa()" class="glass-card p-10 rounded-[2.5rem] text-center cursor-pointer"><span class="text-3xl">📿</span><p class="mt-2 font-bold text-[10px]">DOA</p></div>
          <div onclick="loadTahlil()" class="glass-card p-10 rounded-[2.5rem] text-center cursor-pointer"><span class="text-3xl">🕯️</span><p class="mt-2 font-bold text-[10px]">TAHLIL</p></div>
        </div>
      `;
      loadSholat(localStorage.getItem('cityId') || 1301, cityName);
      setInterval(() => { if(document.getElementById('clock')) document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }, 1000);
    }

    async function loadSholat(id, name) {
      document.getElementById('topCity').innerText = name;
      const res = await fetch(`${API}?action=getSholat&id=${id}`);
      const d = await res.json();
      if(d.status) {
        const j = d.data.jadwal;
        const keys = ['subuh','dzuhur','ashar','maghrib','isya'];
        document.getElementById('prayerGrid').innerHTML = keys.map(k => `<div class="bg-emerald-950/40 p-2 rounded-xl text-center border border-emerald-700/20"><p class="text-[7px] uppercase opacity-50 font-bold">${k}</p><p class="text-[10px] font-black">${j[k]}</p></div>`).join('');
      }
    }

    // --- MENU TAHLIL ---
    async function loadTahlil() {
      showLoading();
      const res = await fetch(`${API}?action=getTahlil`);
      const data = await res.json();
      document.getElementById('appContent').innerHTML = `<div class="space-y-4">` + data.map(t => `
        <div class="glass-card p-8 rounded-[2.5rem]">
          <h4 class="font-bold text-emerald-400 text-sm mb-4">${t.title}</h4>
          <div class="font-quran text-right text-emerald-50 mb-4 leading-relaxed">${t.arabic}</div>
          <p class="text-xs opacity-60 leading-relaxed italic border-t border-emerald-500/10 pt-4">${t.translation}</p>
        </div>`).join('') + `</div>`;
    }

    // --- MENU HADITS (API Direct) ---
    async function loadHadits() {
      document.getElementById('appContent').innerHTML = `
        <div class="glass-card p-8 rounded-[2.5rem] space-y-6 text-center">
          <h3 class="font-bold text-emerald-400 uppercase tracking-widest">Pencarian Hadits</h3>
          <p class="text-[10px] opacity-60">Mencari hadits secara global melalui API Perawi.</p>
          <div class="flex gap-2">
            <input type="text" id="hQuery" class="flex-1 bg-emerald-950 p-4 rounded-xl outline-none" placeholder="Kata kunci...">
            <button onclick="searchHaditsGlobal()" class="bg-emerald-500 text-emerald-950 px-6 font-bold rounded-xl">CARI</button>
          </div>
          <div id="hResults" class="space-y-4 text-left"></div>
        </div>
      `;
    }

    async function searchHaditsGlobal() {
      const q = document.getElementById('hQuery').value;
      document.getElementById('hResults').innerHTML = '<div class="loader w-6 h-6 border-2 mx-auto mt-4 rounded-full"></div>';
      const res = await fetch(`https://hadis-api-id.vercel.app/hadith/abu-daud?range=1-50`);
      const d = await res.json();
      const filtered = d.items.filter(h => h.id.toLowerCase().includes(q.toLowerCase()));
      document.getElementById('hResults').innerHTML = filtered.map(h => `
        <div class="p-6 bg-emerald-900/30 rounded-2xl border border-emerald-800 mt-4">
          <div class="font-quran text-right mb-4 text-sm">${h.arab}</div>
          <p class="text-[10px] opacity-70 leading-relaxed">${h.id}</p>
        </div>`).join('') || "Tidak ditemukan di sampel data.";
    }

    async function fullSyncServer() {
      if(!confirm("Mulai Sync Data ke Spreadsheet?")) return;
      showLoading();
      const res = await fetch(`${API}?action=syncSemua`);
      const d = await res.json();
      alert("Sync Berhasil: Quran, Doa, & Perawi!");
      goHome();
    }

    async function loadQuran() { showLoading(); const res = await fetch(`${API}?action=getSurahList`); const list = await res.json(); document.getElementById('appContent').innerHTML = `<div class="grid grid-cols-1 gap-2">` + list.map(s => `<div onclick="openSurah(${s.ID}, '${s.Nama}')" class="glass-card p-5 rounded-[2rem] flex justify-between items-center cursor-pointer"><div class="flex items-center gap-4"><span class="w-8 h-8 bg-emerald-500 text-emerald-950 flex items-center justify-center rounded-lg font-black text-[10px]">${s.ID}</span><p class="font-bold text-sm">${s.Nama}</p></div><span class="font-quran text-2xl opacity-20">${s['Nama Arab']}</span></div>`).join('') + `</div>`; }
    async function openSurah(id, name) { showLoading(); const res = await fetch(`${API}?action=getAyatData&surahId=${id}`); const ayats = await res.json(); document.getElementById('appContent').innerHTML = `<div class="flex justify-between items-center mb-6 bg-emerald-900/30 p-4 rounded-2xl"><button onclick="openSurah(${id-1})" class="text-[10px] font-bold">← PREV</button><h2 class="font-black">${name}</h2><button onclick="openSurah(${id+1})" class="text-[10px] font-bold">NEXT →</button></div><div class="space-y-4">` + ayats.map(a => `<div class="glass-card p-8 rounded-[2.5rem]"><div class="text-right font-quran text-emerald-50 mb-6">${a.teksArab}</div><p class="text-xs opacity-60 leading-relaxed italic border-l-2 border-emerald-500 pl-4">${a.teksIndonesia}</p></div>`).join('') + `</div>`; window.scrollTo(0,0); }
    async function loadDoa() { showLoading(); const res = await fetch(`${API}?action=getDoa`); const data = await res.json(); document.getElementById('appContent').innerHTML = `<div class="space-y-4">` + data.map(d => `<div class="glass-card p-8 rounded-[2.5rem]"><p class="text-[8px] font-bold text-emerald-500 mb-2 uppercase">Doa Harian</p><h4 class="font-bold text-sm mb-4">${d.Judul}</h4><div class="font-quran text-right text-emerald-50 mb-4">${d.Arab}</div><p class="text-xs opacity-60">${d.Terjemah}</p></div>`).join('') + `</div>`; }

    window.onload = () => { goHome(); };
  </script>
</body>
</html>
