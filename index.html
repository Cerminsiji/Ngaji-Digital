<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --quran-size: 2.2rem; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #011a14; color: #f0fdf4; margin:0; }
    .font-quran { font-family: 'Amiri', serif; font-size: var(--quran-size); direction: rtl; line-height: 2.2; }
    .glass { background: rgba(6, 78, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(16, 185, 129, 0.1); }
    .btn-active:active { transform: scale(0.95); transition: 0.1s; }
    .calendar-glow { text-shadow: 0 0 15px rgba(52, 211, 153, 0.3); }
  </style>
</head>
<body class="pb-32">

  <header class="p-6 sticky top-0 z-50 glass flex justify-between items-center border-b border-white/5">
    <div>
      <h1 class="text-xl font-black text-emerald-400 leading-none">Ngaji Digital</h1>
      <p id="cityLabel" class="text-[9px] font-bold opacity-40 uppercase tracking-widest mt-1 italic">Memuat...</p>
    </div>
    <button onclick="toggleModal('cityModal')" class="bg-emerald-500 text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase btn-active">Ganti Kota</button>
  </header>

  <main id="appContent" class="p-5 max-w-xl mx-auto space-y-6"></main>

  <div id="cityModal" class="fixed inset-0 z-[60] bg-black/95 backdrop-blur-md p-8 hidden">
    <div class="flex justify-between items-center mb-8">
      <h3 class="font-black text-emerald-400 uppercase tracking-tighter text-xl">Cari Kota</h3>
      <button onclick="toggleModal('cityModal')" class="text-red-400 font-bold text-xs bg-red-400/10 px-4 py-2 rounded-full">TUTUP</button>
    </div>
    <div class="flex gap-2 mb-6">
      <input type="text" id="cityInput" class="flex-1 bg-emerald-900/30 p-5 rounded-2xl outline-none border border-emerald-500/20 focus:border-emerald-500 transition-all text-white" placeholder="Nama kota/kabupaten...">
      <button onclick="searchCity()" class="bg-emerald-500 text-black px-8 font-black rounded-2xl btn-active uppercase text-[10px]">CARI</button>
    </div>
    <div id="cityResult" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 glass p-5 flex justify-around items-center z-50 rounded-t-[2.5rem] border-t border-emerald-500/10">
    <button onclick="renderHome()" class="flex flex-col items-center gap-1"><span class="text-xl">🏠</span><span class="text-[8px] font-black uppercase tracking-tighter opacity-60">Home</span></button>
    <button onclick="loadQuran()" class="flex flex-col items-center gap-1"><span class="text-xl">📖</span><span class="text-[8px] font-black uppercase tracking-tighter opacity-60">Quran</span></button>
    <button onclick="loadDoa()" class="flex flex-col items-center gap-1"><span class="text-xl">📿</span><span class="text-[8px] font-black uppercase tracking-tighter opacity-60">Doa</span></button>
    <button onclick="loadTahlil()" class="flex flex-col items-center gap-1"><span class="text-xl">🕯️</span><span class="text-[8px] font-black uppercase tracking-tighter opacity-60">Tahlil</span></button>
  </nav>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbwQnpc4W4tWJGff65X0aj11yfnJ7eXQCac590phW-aH_DSLZmLW3hS_347pixqWAmJD/exec";

    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

    function renderHome() {
      const city = localStorage.getItem('m_city_name') || "JAKARTA";
      const cid = localStorage.getItem('m_city_id') || 1301;
      
      document.getElementById('appContent').innerHTML = `
        <div class="p-8 rounded-[3rem] bg-gradient-to-br from-emerald-800 to-emerald-950 shadow-2xl relative overflow-hidden border border-white/5">
          <div class="relative z-10 text-center">
            <div id="calendarHeader" class="mb-6 space-y-1">
              <p class="text-[8px] font-black text-emerald-500/50 uppercase tracking-[0.3em]">Masehi</p>
              <p id="dateMasehi" class="text-xs font-extrabold text-white uppercase tracking-tight italic">Memuat...</p>
              <div class="py-2"><p id="dateHijri" class="text-2xl font-quran text-emerald-400 calendar-glow leading-none italic tracking-widest">-- -- ---- H</p></div>
              <p class="text-[8px] font-black text-emerald-500/50 uppercase tracking-[0.3em]">Hijriyah</p>
            </div>
            <h2 id="digitalClock" class="text-7xl font-black tracking-tighter mb-2">00:00</h2>
            <p class="text-[10px] font-black text-emerald-400 bg-emerald-400/10 inline-block px-3 py-1 rounded-full uppercase tracking-widest mb-8 italic">📍 ${city}</p>
            <div id="sholatGrid" class="grid grid-cols-3 gap-3">
              ${['Imsak','Subuh','Dzuhur','Ashar','Maghrib','Isya'].map(s => `
                <div class="text-center p-3 bg-black/20 rounded-2xl border border-white/5">
                  <p class="text-[8px] font-black uppercase opacity-40 mb-1">${s}</p>
                  <p id="val-${s.toLowerCase()}" class="text-sm font-black tracking-tight">--:--</p>
                </div>`).join('')}
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div onclick="loadQuran()" class="glass p-8 rounded-[2.5rem] text-center btn-active cursor-pointer"><span class="text-3xl">📖</span><p class="text-[9px] font-black mt-3 uppercase opacity-50 tracking-tighter">Al-Quran</p></div>
          <div onclick="fullSync()" id="syncBtn" class="glass p-8 rounded-[2.5rem] text-center border-emerald-500/20 btn-active cursor-pointer"><span class="text-3xl">🔄</span><p class="text-[9px] font-black mt-3 uppercase opacity-50 tracking-tighter">Sync Data</p></div>
        </div>
      `;
      updateClock(); fetchDataHome(cid, city);
    }

    function updateClock() {
      const el = document.getElementById('digitalClock');
      if(el) {
        const now = new Date();
        el.innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
      }
      setTimeout(updateClock, 1000);
    }

    async function fetchDataHome(id, name) {
      document.getElementById('cityLabel').innerText = "📍 " + name;
      try {
        const [resCal, resSholat] = await Promise.all([
          fetch(`${API}?action=getCalendar`).then(r => r.json()),
          fetch(`${API}?action=getSholat&id=${id}`).then(r => r.json())
        ]);
        if(resCal.status) {
          document.getElementById('dateMasehi').innerText = resCal.masehi;
          document.getElementById('dateHijri').innerText = resCal.hijri;
        }
        if(resSholat.status && resSholat.data.jadwal) {
          const j = resSholat.data.jadwal;
          ['imsak','subuh','dzuhur','ashar','maghrib','isya'].forEach(k => {
            const el = document.getElementById('val-' + k);
            if(el) el.innerText = j[k] || "--:--";
          });
        }
      } catch(e) { console.log(e); }
    }

    async function searchCity() {
      const q = document.getElementById('cityInput').value;
      if(!q) return;
      document.getElementById('cityResult').innerHTML = '<p class="text-center py-4 font-bold opacity-30 uppercase tracking-tighter">Mencari...</p>';
      try {
        const res = await fetch(`${API}?action=searchKota&q=${q}`);
        const d = await res.json();
        if(d.status && d.data) {
          document.getElementById('cityResult').innerHTML = d.data.map(c => `
            <div onclick="setCity('${c.id}', '${c.lokasi}')" class="p-5 glass rounded-2xl font-black text-sm cursor-pointer hover:bg-emerald-500 hover:text-black transition-all uppercase tracking-tighter">📍 ${c.lokasi}</div>
          `).join('');
        }
      } catch(e) { }
    }

    function setCity(id, name) {
      localStorage.setItem('m_city_id', id);
      localStorage.setItem('m_city_name', name);
      toggleModal('cityModal');
      renderHome();
    }

    async function fullSync() {
      const btn = document.getElementById('syncBtn'); btn.classList.add('animate-pulse');
      try {
        const res = await fetch(`${API}?action=sync`);
        const d = await res.json(); alert(d.message);
      } catch(e) { alert("Sync Gagal!"); }
      btn.classList.remove('animate-pulse'); renderHome();
    }

    async function loadQuran() {
      document.getElementById('appContent').innerHTML = '<div class="py-20 text-center animate-pulse uppercase font-black text-emerald-400">Membuka Mushaf...</div>';
      const res = await fetch(`${API}?action=getSurah`);
      const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(s => `<div onclick="openSurah(${s.ID}, '${s.Nama}')" class="glass p-5 rounded-3xl flex justify-between items-center cursor-pointer btn-active mb-3"><div class="flex items-center gap-5"><span class="w-10 h-10 bg-emerald-500 text-black flex items-center justify-center rounded-2xl font-black text-xs">${s.ID}</span><p class="font-black text-sm uppercase">${s.Nama}</p></div><span class="font-quran text-xl text-emerald-200/40">${s["Nama Arab"]}</span></div>`).join('');
    }

    async function openSurah(id, name) {
      document.getElementById('appContent').innerHTML = '<div class="py-20 text-center animate-pulse uppercase font-black">Memuat Ayat...</div>';
      const res = await fetch(`${API}?action=getAyatData&surahId=${id}`);
      const d = await res.json();
      document.getElementById('appContent').innerHTML = `<div class="glass p-8 rounded-[2.5rem] mb-6 text-center italic font-black text-emerald-400 text-2xl uppercase">${name}</div>` + d.ayat.map(a => `<div class="glass p-10 rounded-[3rem] border border-white/5 mb-6 relative"><span class="absolute top-8 left-8 text-[9px] font-black opacity-30 italic">${a.nomorAyat}</span><div class="font-quran text-right mb-8 text-emerald-50">${a.teksArab}</div><p class="text-[13px] opacity-60 italic border-l-2 border-emerald-500/30 pl-6">${a.teksIndonesia}</p></div>`).join('');
      window.scrollTo(0,0);
    }

    async function loadDoa() {
      const res = await fetch(`${API}?action=getDoa`); const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(d => `<div class="glass p-10 rounded-[3rem] mb-6"><h4 class="font-black text-emerald-400 uppercase text-[11px] mb-6">${d.Judul}</h4><div class="font-quran text-right mb-6">${d.Arab}</div><p class="text-xs opacity-50 italic pt-6 border-t border-white/5">${d.Terjemah}</p></div>`).join('');
    }

    async function loadTahlil() {
      const res = await fetch(`${API}?action=getTahlil`); const data = await res.json();
      document.getElementById('appContent').innerHTML = data.map(t => `<div class="glass p-10 rounded-[3rem] mb-6"><h4 class="font-black text-emerald-400 uppercase text-[11px] mb-6">${t.Judul}</h4><div class="font-quran text-right mb-6">${t.Arab}</div><p class="text-xs opacity-50 italic pt-6 border-t border-white/5">${t.Terjemah}</p></div>`).join('');
    }

    window.onload = renderHome;
  </script>
</body>
</html>
